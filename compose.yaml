services:
  qbo-mcp-server:
    build: .
    image: qbo-mcp-server:latest
    container_name: qbo-mcp
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MCP_TRANSPORT=http
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
